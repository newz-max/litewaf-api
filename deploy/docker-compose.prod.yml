services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litewaf}
      POSTGRES_USER: ${POSTGRES_USER:-litewaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litewaf_dev_password}
    volumes:
      - litewaf-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - litewaf-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-config-permissions:
    image: ${LITEWAF_IMAGE_PREFIX:-litewaf}/litewaf-gateway:${LITEWAF_IMAGE_TAG:-latest}
    entrypoint: ["/bin/sh", "-c", "chown -R 999:999 /etc/litewaf && chmod -R u+rwX,go+rX /etc/litewaf"]
    volumes:
      - litewaf-gateway-config:/etc/litewaf
    restart: "no"

  waf-api:
    image: ${LITEWAF_IMAGE_PREFIX:-litewaf}/litewaf-api:${LITEWAF_IMAGE_TAG:-latest}
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-litewaf}:${POSTGRES_PASSWORD:-litewaf_dev_password}@postgres:5432/${POSTGRES_DB:-litewaf}?sslmode=disable
      REDIS_ADDR: redis:6379
      GATEWAY_CONFIG_PATH: /var/lib/litewaf/gateway/active.json
      GATEWAY_RELOAD_COMMAND: ${GATEWAY_RELOAD_COMMAND:-}
      GATEWAY_LISTENER_MODE: ${GATEWAY_LISTENER_MODE:-host-network}
      GATEWAY_BRIDGE_PORT_RANGE: ${GATEWAY_BRIDGE_PORT_RANGE:-}
      LITEWAF_GATEWAY_CLIENT_MAX_BODY_SIZE: ${LITEWAF_GATEWAY_CLIENT_MAX_BODY_SIZE:-50m}
      PUBLISH_OPERATOR: ${PUBLISH_OPERATOR:-compose}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      GATEWAY_INGESTION_TOKEN: ${GATEWAY_INGESTION_TOKEN:?GATEWAY_INGESTION_TOKEN is required}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      LITEWAF_GEOIP_DB_PATH: ${LITEWAF_GEOIP_DB_PATH:-}
      LITEWAF_GEOIP_CHINA_DB_PATH: ${LITEWAF_GEOIP_CHINA_DB_PATH:-}
      LITEWAF_GEOIP_CACHE_SIZE: ${LITEWAF_GEOIP_CACHE_SIZE:-2048}
      LITEWAF_ADMIN_USERNAME: ${LITEWAF_ADMIN_USERNAME:-admin}
      LITEWAF_ADMIN_PASSWORD: ${LITEWAF_ADMIN_PASSWORD:?LITEWAF_ADMIN_PASSWORD is required}
      LITEWAF_ADMIN_ROLE: ${LITEWAF_ADMIN_ROLE:-admin}
    volumes:
      - litewaf-gateway-config:/var/lib/litewaf/gateway
      - ./data/geoip:/var/lib/litewaf/geoip:ro
    ports:
      - "${API_LOOPBACK_ADDR:-127.0.0.1}:${API_LOOPBACK_PORT:-18081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway-config-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/litewaf-api", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: ${LITEWAF_IMAGE_PREFIX:-litewaf}/litewaf-dashboard:${LITEWAF_IMAGE_TAG:-latest}
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      waf-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ${LITEWAF_IMAGE_PREFIX:-litewaf}/litewaf-gateway:${LITEWAF_IMAGE_TAG:-latest}
    network_mode: host
    environment:
      LITEWAF_CONFIG_PATH: /etc/litewaf/active.json
      LITEWAF_INGESTION_URL: ${LITEWAF_INGESTION_URL:-http://127.0.0.1:${API_LOOPBACK_PORT:-18081}}
      LITEWAF_INGESTION_TOKEN: ${GATEWAY_INGESTION_TOKEN:?GATEWAY_INGESTION_TOKEN is required}
      LITEWAF_METRICS_ENABLED: ${LITEWAF_METRICS_ENABLED:-false}
      LITEWAF_SENSITIVE_HEADERS: ${LITEWAF_SENSITIVE_HEADERS:-authorization,cookie,set-cookie}
      LITEWAF_LOG_VALUE_MAX_LEN: ${LITEWAF_LOG_VALUE_MAX_LEN:-160}
      LITEWAF_REAL_IP_TRUSTED_CIDRS: ${LITEWAF_REAL_IP_TRUSTED_CIDRS:-}
      LITEWAF_REAL_IP_HEADER: ${LITEWAF_REAL_IP_HEADER:-X-Forwarded-For}
      LITEWAF_REAL_IP_RECURSIVE: ${LITEWAF_REAL_IP_RECURSIVE:-on}
    volumes:
      - litewaf-gateway-config:/etc/litewaf
    depends_on:
      waf-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/openresty/bin/openresty -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  litewaf-postgres:
  litewaf-redis:
  litewaf-gateway-config:
