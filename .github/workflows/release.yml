name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true

      - name: Validate tag version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          RELEASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          APP_VERSION="$(sed -nE 's/^var Version = "([^"]+)"/\1/p' internal/app/app.go)"
          if [ -z "${RELEASE_VERSION}" ]; then
            echo "Cannot read release version from VERSION" >&2
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${RELEASE_VERSION}" >&2
            exit 1
          fi
          if [ "${APP_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "App version ${APP_VERSION} does not match VERSION ${RELEASE_VERSION}" >&2
            exit 1
          fi
          echo "LITEWAF_VERSION=${RELEASE_VERSION}" >> "${GITHUB_ENV}"

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "release/litewaf-api/bin"
          go build -trimpath \
            -ldflags="-s -w -X litewaf-api/internal/app.Version=${LITEWAF_VERSION}" \
            -o "release/litewaf-api/bin/litewaf-api" \
            ./cmd/litewaf-api

      - name: Collect fallback deployment files
        run: |
          cp -r db release/litewaf-api/
          cp -r rules release/litewaf-api/
          cp README.md LICENSE release/litewaf-api/
          cat > release/litewaf-api/VERSION <<EOF
          ${LITEWAF_VERSION}
          EOF
          cat > release/litewaf-api/RELEASE_PACKAGE.md <<'EOF'
          # LiteWaf API release package

          This package is a non-Docker fallback deployment asset. It contains the
          prebuilt Linux API binary, database initialization files, default rules,
          and project documentation. It does not replace or modify the Docker image
          publishing path.

          Configure runtime values with environment variables such as HTTP_ADDR,
          DATABASE_URL, REDIS_ADDR, AUTH_TOKEN_SECRET, GATEWAY_CONFIG_PATH,
          LITEWAF_ADMIN_USERNAME, and LITEWAF_ADMIN_PASSWORD.
          EOF

      - name: Pack release asset
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/litewaf-api-${GITHUB_REF_NAME}-linux-${{ matrix.goarch }}.tar.gz" -C release litewaf-api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: litewaf-api-linux-${{ matrix.goarch }}
          path: release-assets/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
