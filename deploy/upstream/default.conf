server {
    listen 80;
    server_name _;

    location = /healthz {
        default_type application/json;
        return 200 '{"service":"litewaf-validation-upstream","status":"ok"}';
    }

    location = /echo {
        default_type application/json;
        return 200 '{"service":"litewaf-validation-upstream","method":"$request_method","host":"$host","uri":"$request_uri","user_agent":"$http_user_agent"}';
    }

    location / {
        default_type application/json;
        return 200 '{"service":"litewaf-validation-upstream","status":"ok","uri":"$request_uri"}';
    }
}
